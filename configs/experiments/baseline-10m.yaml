extends: ../base.yaml

name: baseline-10m
notes: Long-run baseline using reference_v1 reward for checkpoint selection across 10M timesteps.
tags:
  - baseline
  - long-run
  - checkpoint-search
  - reference-v1

runtime:
  experiment_name: baseline-10m

env:
  state: Champion.Level12.RyuVsBison
  buttons:
    - B
    - A
    - MODE
    - START
    - UP
    - DOWN
    - LEFT
    - RIGHT
    - C
    - Y
    - X
    - Z
  grayscale: false
  frame_stack: 9
  stack_mode: legacy_reference

ppo:
  total_timesteps: 15000000               #增加訓練
  num_envs: 16
  n_steps: 512
  batch_size: 512
  n_epochs: 4
  gamma: 0.94
  ent_coef: 0.0
  checkpoint_freq: 500000

evaluation:
  episodes: 5
  deterministic: true
  render: false
  save_metrics: true
  trigger_every_n_timesteps: 500000

recording:
  enabled: true
  episodes: 1
  deterministic: true
  fps: 10
  overlay: false
  save_video: true
  render: false
  crop_black_borders: true